<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>New Expense — XYZ Expense Tracker</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="nav-brand">✈ XYZ Expense Tracker</div>
    <ul class="nav-links">
      <li><a href="index.html">Dashboard</a></li>
      <li><a href="expense-form.html" class="active">New Expense</a></li>
      <li><a href="reports.html">Reports</a></li>
    </ul>
    <button class="nav-toggle" id="nav-toggle" aria-label="Toggle navigation">☰</button>
  </nav>

  <main class="container">
    <header class="page-header">
      <h1>Record Expense</h1>
      <p>Enter expense details, attach receipt, and link to a flight</p>
    </header>

    <section class="panel">
      <div id="form-errors" class="form-errors"></div>
      <div id="form-success" class="form-success" style="display:none;"></div>

      <form id="expense-form" novalidate>
        <div class="form-row">
          <div class="form-group">
            <label for="expense-date">Date <span class="required">*</span></label>
            <input type="date" id="expense-date" required>
          </div>
          <div class="form-group">
            <label for="expense-amount">Amount (USD) <span class="required">*</span></label>
            <input type="number" id="expense-amount" step="0.01" min="0.01" placeholder="0.00" required>
          </div>
        </div>

        <div class="form-group">
          <label for="expense-description">Description <span class="required">*</span></label>
          <input type="text" id="expense-description" placeholder="e.g., Fuel refill at GRU" required>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="expense-category">Category <span class="required">*</span></label>
            <select id="expense-category" required>
            </select>
          </div>
          <div class="form-group">
            <label for="expense-flight">Link to Flight</label>
            <select id="expense-flight">
            </select>
          </div>
        </div>

        <div class="form-group">
          <label for="expense-receipt">Receipt Upload</label>
          <input type="file" id="expense-receipt" accept="image/*,.pdf,.jpg,.jpeg,.png">
          <div id="receipt-preview" class="receipt-preview" style="display:none;"></div>
        </div>

        <div class="form-actions">
          <button type="submit" class="btn btn-primary">Add Expense</button>
          <button type="reset" class="btn btn-secondary">Clear</button>
        </div>
      </form>
    </section>

    <section class="panel">
      <h2>Category Management</h2>
      <div class="form-row category-add-row">
        <div class="form-group" style="flex:1;">
          <input type="text" id="new-category-input" placeholder="New category name...">
        </div>
        <button type="button" id="add-category-btn" class="btn btn-primary">Add Category</button>
      </div>
      <div id="category-list" class="category-list"></div>
    </section>

    <section class="panel">
      <h2>Recent Expenses</h2>
      <div id="recent-expenses"></div>
    </section>
  </main>

  <footer class="footer">
    <p>&copy; 2025 XYZ Empresa — Pilot Expense Tracking System</p>
  </footer>

  <script src="js/app.js"></script>
  <script src="js/expense-form.js"></script>
  <script>
    document.getElementById('nav-toggle').addEventListener('click', function () {
      document.querySelector('.nav-links').classList.toggle('nav-open');
    });
  </script>
</body>
</html>
