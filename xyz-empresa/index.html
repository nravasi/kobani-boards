<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>XYZ Empresa — Pilot Expense Tracker</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="nav-brand">✈ XYZ Expense Tracker</div>
    <ul class="nav-links">
      <li><a href="index.html" class="active">Dashboard</a></li>
      <li><a href="expense-form.html">New Expense</a></li>
      <li><a href="reports.html">Reports</a></li>
    </ul>
    <button class="nav-toggle" id="nav-toggle" aria-label="Toggle navigation">☰</button>
  </nav>

  <main class="container">
    <header class="page-header">
      <h1>Expense Dashboard</h1>
      <p>Overview of pilot expense activity</p>
    </header>

    <section class="summary-cards" id="summary-cards">
    </section>

    <section class="panel">
      <h2>Expenses by Category</h2>
      <div id="category-breakdown"></div>
    </section>

    <section class="panel">
      <h2>Expenses by Flight</h2>
      <div id="flight-breakdown"></div>
    </section>

    <section class="panel">
      <h2>Recent Activity</h2>
      <div id="recent-activity"></div>
    </section>
  </main>

  <footer class="footer">
    <p>&copy; 2025 XYZ Empresa — Pilot Expense Tracking System</p>
  </footer>

  <script src="js/app.js"></script>
  <script src="js/dashboard.js"></script>
  <script>
    document.getElementById('nav-toggle').addEventListener('click', function () {
      document.querySelector('.nav-links').classList.toggle('nav-open');
    });
  </script>
</body>
</html>
