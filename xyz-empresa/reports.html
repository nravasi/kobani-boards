<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reports — XYZ Expense Tracker</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="nav-brand">✈ XYZ Expense Tracker</div>
    <ul class="nav-links">
      <li><a href="index.html">Dashboard</a></li>
      <li><a href="expense-form.html">New Expense</a></li>
      <li><a href="reports.html" class="active">Reports</a></li>
    </ul>
    <button class="nav-toggle" id="nav-toggle" aria-label="Toggle navigation">☰</button>
  </nav>

  <main class="container">
    <header class="page-header">
      <h1>Expense Reports</h1>
      <p>Filter, review, and export your expense data</p>
    </header>

    <section class="panel">
      <h2>Filters</h2>
      <div class="filter-row">
        <div class="form-group">
          <label for="filter-date-from">From</label>
          <input type="date" id="filter-date-from">
        </div>
        <div class="form-group">
          <label for="filter-date-to">To</label>
          <input type="date" id="filter-date-to">
        </div>
        <div class="form-group">
          <label for="filter-category">Category</label>
          <select id="filter-category">
            <option value="">All Categories</option>
          </select>
        </div>
        <div class="form-group">
          <label for="filter-flight">Flight</label>
          <select id="filter-flight">
            <option value="">All Flights</option>
          </select>
        </div>
      </div>
      <div class="form-actions">
        <button type="button" id="apply-filters-btn" class="btn btn-primary">Apply Filters</button>
        <button type="button" id="reset-filters-btn" class="btn btn-secondary">Reset</button>
        <button type="button" id="export-csv-btn" class="btn btn-success">⬇ Export CSV</button>
      </div>
    </section>

    <section class="panel">
      <h2>Report Summary</h2>
      <div id="report-summary"></div>
    </section>

    <section class="panel">
      <h2>Expense Details</h2>
      <div id="report-table"></div>
    </section>
  </main>

  <footer class="footer">
    <p>&copy; 2025 XYZ Empresa — Pilot Expense Tracking System</p>
  </footer>

  <script src="js/app.js"></script>
  <script src="js/reports.js"></script>
  <script>
    document.getElementById('nav-toggle').addEventListener('click', function () {
      document.querySelector('.nav-links').classList.toggle('nav-open');
    });
  </script>
</body>
</html>
